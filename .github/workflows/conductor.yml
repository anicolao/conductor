name: Conductor

run-name: Conductor for ${{ github.event.client_payload.repository || github.repository }} #${{ github.event.client_payload.issue_number || github.event.issue.number }}

on:
  repository_dispatch:
    types: [project_in_progress, external_issue_event, external_issue_comment]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-conductor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONDUCTOR_TOKEN }}

      - name: Determine Branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.CONDUCTOR_TOKEN }}
        run: |
          BRANCH=""
          ISSUE_NUMBER=$(jq -r '.client_payload.issue_number // empty' "$GITHUB_EVENT_PATH")
          REPOSITORY=$(jq -r '.client_payload.repository // empty' "$GITHUB_EVENT_PATH")
          
          if [ -z "$REPOSITORY" ]; then
            REPOSITORY="${{ github.repository }}"
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            BRANCH=$(gh api "repos/$REPOSITORY/issues/$ISSUE_NUMBER" --jq '.labels[].name | select(startswith("branch:"))' 2>/dev/null | cut -d':' -f2- | xargs || true)
          fi

          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Selected branch: $BRANCH"

      - name: Switch to Branch
        run: |
          BRANCH=${{ steps.branch.outputs.branch }}
          if [ "$BRANCH" != "main" ]; then
            git checkout $BRANCH || git checkout -b $BRANCH
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run Conductor
        env:
          CONDUCTOR_TOKEN: ${{ secrets.CONDUCTOR_TOKEN }}
          GH_TOKEN: ${{ secrets.CONDUCTOR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.CONDUCTOR_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: npm start
