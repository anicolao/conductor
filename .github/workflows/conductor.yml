name: Conductor

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-conductor:
    if: github.event.issue && (github.event.issue.labels.*.name || contains(github.event.comment.body, '@conductor') || contains(github.event.issue.body, '@conductor'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_EVENT_PATH: ${{ github.event_path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Run Conductor Loop
        run: |
          ISSUE_NUMBER=$(jq -r '.issue.number // .client_payload.issue_number // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No issue number found in event payload"
            exit 1
          fi

          current_branch() {
            git branch --show-current
          }

          checkout_branch() {
            BRANCH="$1"

            if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ]; then
              if [ "$(current_branch)" != "main" ]; then
                git checkout main
              fi
              git pull --ff-only origin main
              return
            fi

            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          }

          for HOP in $(seq 1 6); do
            echo "=== Hop $HOP ==="

            ISSUE_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}")
            PERSONA=$(echo "$ISSUE_JSON" | jq -r '.labels[]?.name | select(startswith("persona:"))' | head -n1 | cut -d':' -f2- | xargs)
            BRANCH=$(echo "$ISSUE_JSON" | jq -r '.labels[]?.name | select(startswith("branch:"))' | head -n1 | cut -d':' -f2- | xargs)

            if [ -z "$PERSONA" ] && [ "$HOP" -eq 1 ]; then
              TRIGGER_TEXT=$(jq -r '.comment.body // .issue.body // ""' "$GITHUB_EVENT_PATH")
              if printf '%s' "$TRIGGER_TEXT" | grep -q '@conductor'; then
                PERSONA="conductor"
              fi
            fi

            if [ -z "$PERSONA" ]; then
              echo "No active persona label or @conductor mention remains. Stopping."
              exit 0
            fi

            echo "Persona: $PERSONA"
            echo "Branch: ${BRANCH:-main}"

            checkout_branch "$BRANCH"

            npm install
            npm run build
            npm start
          done

          echo "Reached hop limit while an active persona still exists on issue #$ISSUE_NUMBER"
          exit 1
